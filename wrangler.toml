#:schema node_modules/wrangler/config-schema.json
name = "scott-agent"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Custom entry wrapping .open-next/worker.js — adds the `scheduled`
# handler the cron triggers need (OpenNext only generates `fetch`).
main = "worker-entry.mjs"
minify = true
account_id = "9946dede036802fcd2a0b9cef8e13574"

# Raise the per-request CPU ceiling from the Paid-plan 30s default to 60s.
# Free on the Paid plan; only a backstop against CPU-heavy report renders
# tripping Error 1102. Does NOT affect the separate ~400ms cold-start limit.
[limits]
cpu_ms = 60000

# Cron Triggers for scheduled tasks
[triggers]
crons = ["*/15 * * * *"]  # Run every 15 minutes


# Assets configuration for static files (OpenNext)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Storage Bindings - Default (Staging)
[[d1_databases]]
binding = "DB"
database_name = "scott-agent-staging"
database_id = "74a8a0c6-840f-4f3c-ac44-cddec222bf4f" 

[[d1_databases]]
binding = "DB_SCOTT"
database_name = "scott-agent-scott-staging"
database_id = "14920e85-355d-43b2-979b-d8ecc5477df8"

[[r2_buckets]]
binding = "R2"
bucket_name = "scott-agent-staging"

[[d1_databases]]
binding = "DB_OTHER"
database_name = "scott-agent-production"
database_id = "15702662-aff7-4d53-ad2a-824a56882138"

[[d1_databases]]
binding = "DB_SCOTT_OTHER"
database_name = "scott-agent-scott-production"
database_id = "06504362-1040-417c-a1f1-e0cdc0c12604"

[[r2_buckets]]
binding = "R2_OTHER"
bucket_name = "scott-agent-production"

# Staging Environment
[env.staging]
name = "scott-agent-staging"
routes = [
  { pattern = "staging.scott-agent.com", custom_domain = true }
]

[env.staging.vars]
RESEND_API_KEY = "re_3e8UHBP1_4ecHGufTVorDB4GKKkTYDJjP"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "scott-agent-staging"
database_id = "74a8a0c6-840f-4f3c-ac44-cddec222bf4f"

[[env.staging.d1_databases]]
binding = "DB_SCOTT"
database_name = "scott-agent-scott-staging"
database_id = "14920e85-355d-43b2-979b-d8ecc5477df8"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "scott-agent-staging"
preview_bucket_name = "scott-agent-staging"

[[env.staging.d1_databases]]
binding = "DB_OTHER"
database_name = "scott-agent-production"
database_id = "15702662-aff7-4d53-ad2a-824a56882138"

[[env.staging.d1_databases]]
binding = "DB_SCOTT_OTHER"
database_name = "scott-agent-scott-production"
database_id = "06504362-1040-417c-a1f1-e0cdc0c12604"

[[env.staging.r2_buckets]]
binding = "R2_OTHER"
bucket_name = "scott-agent-production"

# Production Environment
[env.production]
name = "scott-agent-production"
routes = [
  { pattern = "scott-agent.com", custom_domain = true },
  { pattern = "www.scott-agent.com", custom_domain = true }
]

# Named envs don't inherit the top-level [limits], so repeat it here.
[env.production.limits]
cpu_ms = 60000

[env.production.vars]
RESEND_API_KEY = "re_3e8UHBP1_4ecHGufTVorDB4GKKkTYDJjP"

[[env.production.d1_databases]]
binding = "DB"
database_name = "scott-agent-production"
database_id = "15702662-aff7-4d53-ad2a-824a56882138"

[[env.production.d1_databases]]
binding = "DB_SCOTT"
database_name = "scott-agent-scott-production"
database_id = "06504362-1040-417c-a1f1-e0cdc0c12604"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "scott-agent-production"

[[env.production.d1_databases]]
binding = "DB_OTHER"
database_name = "scott-agent-staging"
database_id = "74a8a0c6-840f-4f3c-ac44-cddec222bf4f"

[[env.production.d1_databases]]
binding = "DB_SCOTT_OTHER"
database_name = "scott-agent-scott-staging"
database_id = "14920e85-355d-43b2-979b-d8ecc5477df8"

[[env.production.r2_buckets]]
binding = "R2_OTHER"
bucket_name = "scott-agent-staging"
